server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      # Both the gateway and the downstream services set CORS headers; drop the
      # duplicates so the browser doesn't reject the response.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      # Global CORS so the Vite frontend (5173) can call the gateway
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              # Frontend (Vite dev + preview)
              - "http://localhost:5173"
              - "http://localhost:4173"
              # Microservices (nội bộ / Swagger UI)
              - "http://localhost:8081"   # event-service
              - "http://localhost:8082"   # ticket-service
              - "http://localhost:8083"   # auth-service
              - "http://localhost:8084"   # payment-service
              - "http://localhost:8085"   # booking-service
              - "http://localhost:8086"   # notification-service
              - "http://localhost:3000"   # Grafana
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**, /api/ticket-types/**, /api/organizers/**, /api/uploads/**
          filters:
            - name: CircuitBreaker
              args:
                name: eventCircuitBreaker
                fallbackUri: forward:/fallback/event
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
          filters:
            - name: CircuitBreaker
              args:
                name: bookingCircuitBreaker
                fallbackUri: forward:/fallback/booking
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentCircuitBreaker
                fallbackUri: forward:/fallback/payment
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**, /api/checkins/**
          filters:
            - name: CircuitBreaker
              args:
                name: ticketCircuitBreaker
                fallbackUri: forward:/fallback/ticket
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      # defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:admin}@localhost:8761/eureka/

tickethub:
  jwt:
    # PUBLIC key only — matches auth-service's RS256 keypair. The gateway can verify tokens but
    # cannot mint them. MUST equal auth-service's tickethub.jwt.public-key.
    public-key: "${JWT_PUBLIC_KEY:}"

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# Cấu hình Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      bookingCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50        # Mở circuit khi 50% request lỗi
        wait-duration-in-open-state: 10s  # Chờ 10s trước khi thử lại
        permitted-calls-in-half-open-state: 3
      paymentCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
      ticketCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
      eventCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 3
server:
  port: 8082

spring:
  application:
    name: ticket-service
  datasource:
    url: ${TICKET_DB_URL:jdbc:postgresql://localhost:5432/ticket_db}
    username: ${DB_USER:tickethub}
    password: ${DB_PASSWORD:tickethub}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ticket-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.tickethub.common.events.EventEventMessage
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.tickethub.common.events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      # defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:admin}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

tickethub:
  services:
    event-url: ${EVENT_SERVICE_URL:http://localhost:8081}
  qr:
    # HMAC secret for signing QR payloads. Rotate by changing this value;
    # previously issued tickets will fail verification (offline check-in only).
    secret: ${QR_SECRET:tickethub-qr-secret-change-in-production}
  kafka:
    topic:
      event-events: event-events
      booking-events: booking-events
      ticket-issued-events: ticket-issued-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tickethub-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server:8761"]
        labels: { service: eureka-server }
      - targets: ["api-gateway:8080"]
        labels: { service: api-gateway }
      - targets: ["auth-service:8083"]
        labels: { service: auth-service }
      - targets: ["event-service:8081"]
        labels: { service: event-service }
      - targets: ["ticket-service:8082"]
        labels: { service: ticket-service }
      - targets: ["payment-service:8084"]
        labels: { service: payment-service }
      - targets: ["booking-service:8085"]
        labels: { service: booking-service }
      - targets: ["notification-service:8086"]
        labels: { service: notification-service }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

# TicketHub — Dev Stack (lightweight)
# Only essential services to prevent OOM on laptops.
# Excludes: kafka-ui, zipkin, prometheus, loki, promtail, grafana.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# Or:
#   docker compose -f docker-compose.dev.yml up -d --build
#
# To stop:
#   docker compose -f docker-compose.dev.yml down

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tickethub-postgres
    environment:
      POSTGRES_USER: tickethub
      POSTGRES_PASSWORD: tickethub
      POSTGRES_DB: tickethub
    ports:
      - "5433:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickethub"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tickethub-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Service discovery & gateway ─────────────────────────────
  eureka-server:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: eureka-server } }
    container_name: tickethub-eureka
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      # test: ["CMD", "wget", "--user=admin", "--password=admin", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512M

  api-gateway:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: api-gateway } }
    container_name: tickethub-gateway
    depends_on:
      eureka-server: { condition: service_healthy }
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      JWT_SECRET: tickethub-super-secret-key-change-me-please-0123456789
    ports: ["8080:8080"]
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Business services ───────────────────────────────────────
  auth-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: auth-service } }
    container_name: tickethub-auth
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      JWT_SECRET: tickethub-super-secret-key-change-me-please-0123456789
    expose: ["8083"]
    deploy:
      resources:
        limits:
          memory: 512M

  event-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: event-service } }
    container_name: tickethub-event
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      EVENT_DB_URL: jdbc:postgresql://postgres:5432/event_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      KAFKA_BOOTSTRAP: kafka:9094
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      AUTH_SERVICE_URL: http://auth-service:8083
    expose: ["8081"]
    deploy:
      resources:
        limits:
          memory: 512M

  payment-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: payment-service } }
    container_name: tickethub-payment
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      KAFKA_BOOTSTRAP: kafka:9094
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      FRONTEND_URL: http://localhost:5173
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-sandbox}
    expose: ["8084"]
    deploy:
      resources:
        limits:
          memory: 512M

  booking-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: booking-service } }
    container_name: tickethub-booking
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
      event-service: { condition: service_started }
      payment-service: { condition: service_started }
    environment:
      BOOKING_DB_URL: jdbc:postgresql://postgres:5432/booking_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      KAFKA_BOOTSTRAP: kafka:9094
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      FRONTEND_URL: http://localhost:5173
      EVENT_SERVICE_URL: http://event-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8084
      TICKET_SERVICE_URL: http://ticket-service:8082
    expose: ["8085"]
    deploy:
      resources:
        limits:
          memory: 512M

  ticket-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: ticket-service } }
    container_name: tickethub-ticket
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      TICKET_DB_URL: jdbc:postgresql://postgres:5432/ticket_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      KAFKA_BOOTSTRAP: kafka:9094
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
      EVENT_SERVICE_URL: http://event-service:8081
    expose: ["8082"]
    deploy:
      resources:
        limits:
          memory: 512M

  notification-service:
    build: { context: ., dockerfile: Dockerfile, args: { MODULE: notification-service } }
    container_name: tickethub-notification
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    environment:
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres:5432/notification_db
      DB_USER: tickethub
      DB_PASSWORD: tickethub
      KAFKA_BOOTSTRAP: kafka:9094
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_USER: admin
      EUREKA_PASSWORD: admin
    expose: ["8086"]
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend (nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: tickethub-frontend
    depends_on: [api-gateway]
    environment:
      API_BASE_URL_INTERNAL: http://api-gateway:8080
    ports:
      - "5173:3000"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:

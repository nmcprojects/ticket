server:
  port: 8083

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:tickethub}
    password: ${DB_PASSWORD:tickethub}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

eureka:
  client:
    service-url:
      # defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:admin}@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

tickethub:
  jwt:
    # RS256 keypair. auth-service signs with the private key; all other services verify with the
    # public key only (so they can validate tokens but cannot mint them). Override in production.
    private-key: "${JWT_PRIVATE_KEY:}"
    public-key: "${JWT_PUBLIC_KEY:}"
    access-token-minutes: 60
    refresh-token-days: 7

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

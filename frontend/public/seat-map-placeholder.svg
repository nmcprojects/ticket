<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sơ đồ chỗ ngồi minh hoạ">
  <rect width="1200" height="800" fill="#f3f1ec"/>
  <defs>
    <pattern id="seats" width="30" height="28" patternUnits="userSpaceOnUse">
      <rect x="5" y="6" width="20" height="14" rx="5" fill="#c9c3b8"/>
    </pattern>
    <pattern id="seatsA" width="30" height="28" patternUnits="userSpaceOnUse">
      <rect x="5" y="6" width="20" height="14" rx="5" fill="#7fb39b"/>
    </pattern>
    <pattern id="seatsVip" width="30" height="28" patternUnits="userSpaceOnUse">
      <rect x="5" y="6" width="20" height="14" rx="5" fill="#cda86a"/>
    </pattern>
  </defs>

  <!-- Stage -->
  <rect x="350" y="64" width="500" height="64" rx="16" fill="#1a1815"/>
  <text x="600" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#f7f6f3" letter-spacing="8">SÂN KHẤU</text>
  <rect x="350" y="138" width="500" height="6" rx="3" fill="#16704f" opacity="0.55"/>

  <!-- VIP block (near stage) -->
  <rect x="360" y="196" width="480" height="96" rx="16" fill="url(#seatsVip)" stroke="#b08544" stroke-width="2"/>
  <!-- Hạng A block -->
  <rect x="320" y="320" width="560" height="120" rx="16" fill="url(#seatsA)" stroke="#4f9e7f" stroke-width="2"/>
  <!-- Standard sections -->
  <rect x="170" y="468" width="300" height="190" rx="16" fill="url(#seats)" stroke="#d8d3c9" stroke-width="2"/>
  <rect x="490" y="468" width="220" height="210" rx="16" fill="url(#seats)" stroke="#d8d3c9" stroke-width="2"/>
  <rect x="730" y="468" width="300" height="190" rx="16" fill="url(#seats)" stroke="#d8d3c9" stroke-width="2"/>

  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="20">
    <rect x="360" y="712" width="20" height="14" rx="4" fill="#cda86a"/>
    <text x="390" y="725" fill="#6e6962">VIP</text>
    <rect x="470" y="712" width="20" height="14" rx="4" fill="#7fb39b"/>
    <text x="500" y="725" fill="#6e6962">Hạng A</text>
    <rect x="610" y="712" width="20" height="14" rx="4" fill="#c9c3b8"/>
    <text x="640" y="725" fill="#6e6962">Thường</text>
  </g>
  <text x="600" y="768" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#a39c8f">Sơ đồ minh hoạ · chỗ ngồi chi tiết sẽ được cập nhật</text>
</svg>
